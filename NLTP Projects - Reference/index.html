<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q&A System in NLP</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #2c3e50, #4ca1af);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 50%;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
        }
        input, button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
        }
        input {
            background: rgba(255, 255, 255, 0.7);
            font-size: 16px;
            color: #333;
        }
        button {
            background: #27ae60;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background: #219150;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 Q&A System in NLP</h1>
        <input type="text" id="question" placeholder="Enter your question...">
        <button onclick="getAnswer()">Get Answer</button>
        <p id="answer"></p>
    </div>
    <script>
        function getAnswer() {
            let question = document.getElementById("question").value;
            let answerBox = document.getElementById("answer");
            if (question.trim() === "") {
                answerBox.innerHTML = "Please enter a question.";
                return;
            }
            answerBox.innerHTML = "Processing...";
            setTimeout(() => {
                answerBox.innerHTML = "This is a placeholder answer. Integrate with backend for actual response.";
            }, 2000);
        }
    </script>
</body>
</html>
